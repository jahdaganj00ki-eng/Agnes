name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - run: pwsh scripts/extract-skills.ps1
    - run: dotnet restore AgnesWindows.sln
    - run: dotnet build src/AgnesWindows.Core/AgnesWindows.Core.csproj --configuration Release --no-restore
    - run: dotnet build src/AgnesWindows.Infrastructure/AgnesWindows.Infrastructure.csproj --configuration Release --no-restore
    - run: dotnet build tests/AgnesWindows.Tests/AgnesWindows.Tests.csproj --configuration Release --no-restore
    - run: dotnet test tests/AgnesWindows.Tests/AgnesWindows.Tests.csproj --no-build --verbosity normal
    - uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: src/**/bin/Release/net9.0-windows/publish/

healer:
  needs: [build-and-test]
  if: failure() && needs.build-and-test.result == 'failure'
  runs-on: ubuntu-latest
  permissions:
    contents: write
    pull-requests: write
    actions: read
  outputs:
    healed: ${{ steps.diagnose.outputs.healed }}
    attempts: ${{ steps.diagnose.outputs.attempts }}
  steps:
  - uses: actions/checkout@v4
  - name: Restore GitHub CLI and PowerShell
    run: |
      sudo apt-get update
      sudo apt-get install -y gh
      sudo apt-get install -y powershell
  - name: Restore .NET SDK (for local rebuild probe)
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 9.0.x
  - name: Download CI logs
    run: |
      mkdir -p .ci-heal/logs
      gh run view ${{ github.run_id }} --log-failed > .ci-heal/parent-log.txt
      echo "PARENT_LOG_PATH=.ci-heal/parent-log.txt" >> $GITHUB_OUTPUT
  - name: Diagnose via CI healer engine
    id: diagnose
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
    run: |
      pwsh scripts/ci-heal.ps1 \
        -Repo "${{ env.GITHUB_REPOSITORY }}" \
        -RunId ${{ github.run_id }} \
        -Token "${{ secrets.GITHUB_TOKEN }}" \
        -MaxAttempts 5
